name: Test dexie_web

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Determinate Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Enable Magic Nix Cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Bootstrap
        run: nix develop --command just bootstrap-ci

      - name: Analyze
        run: nix develop --command just analyze

      - name: Parity check
        run: nix develop --command just parity-check

      - name: Unit tests (Chromium)
        run: nix develop --command just test-web

      - name: E2E tests (headless Chromium)
        env:
          E2E_TIMEOUT_SECONDS: "900"
        run: nix develop --command just e2e

      - name: Upload E2E artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts
          path: |
            example/test-results
            example/playwright-report
          if-no-files-found: warn
